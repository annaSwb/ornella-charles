<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mariage de Ornella & Charles</title>
    <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --ibiza-sun: #F2C94C; --ocean-blue: #2D9CDB; --white: #FFFFFF; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; width: 100%; font-family: 'Cormorant Garamond', serif; background-color: #f2f2f2; overflow: hidden; perspective: 2000px; }
        #global-page-content { position: relative; width: 100%; height: 100%; background-color: var(--white); transform-style: preserve-3d; transform-origin: left center; transition: transform 1.5s cubic-bezier(0.645, 0.045, 0.355, 1); }
        .page-turn-active { transform: rotateY(-130deg); }
        .background-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background-image: url('Cadre-floral-or.png'); background-position: center; background-size: cover; }
        
        /* RECENTRAGE DE FLEUR.PNG POUR MOBILE */
        .floral-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 12; background-image: url('fleur.png'); background-position: center; background-size: contain; background-repeat: no-repeat; pointer-events: none; }
        
        #gold-rain-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; overflow: hidden; }
        .gold-speck { position: absolute; width: 3px; height: 3px; background-color: var(--ibiza-sun); border-radius: 50%; opacity: 0; animation: fall linear infinite; }
        @keyframes fall { 0% { transform: translateY(-10vh); opacity: 0; } 20% { opacity: 0.6; } 100% { transform: translateY(110vh); opacity: 0; } }
        
        .card-wrapper { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; width: 100%; max-width: 350px; text-align: center; }
        .photo-container { width: 140px; height: 200px; margin: 0 auto 20px; border: 2px solid var(--ibiza-sun); padding: 4px; background: #fff; border-radius: 70px 70px 0 0; }
        .photo-container img { width: 100%; height: 100%; object-fit: cover; border-radius: 67px 67px 0 0; }
        h1 { font-family: 'Pinyon Script', cursive; font-size: 2.8rem; color: var(--ibiza-sun); margin-bottom: 15px; }
        .countdown { display: flex; gap: 15px; justify-content: center; margin-bottom: 25px; color: var(--ocean-blue); }
        .count-box { display: flex; flex-direction: column; min-width: 45px; }
        .count-num { font-size: 1.2rem; font-weight: 600; }
        .count-label { font-size: 0.6rem; text-transform: uppercase; opacity: 0.8; }
        .btn { display: inline-block; background-color: var(--ocean-blue); color: #fff; text-decoration: none; padding: 14px 35px; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; border-radius: 50px; z-index: 15; position: relative; }
        @media (max-width: 480px) { .floral-overlay { background-size: 90% auto; } }
    </style>
</head>
<body>
    <div id="global-page-content">
        <div class="background-container"></div>
        <div class="floral-overlay"></div>
        <div id="gold-rain-container"></div>
        <div class="card-wrapper">
            <div class="photo-container"><img src="photo.jpeg"></div>
            <h1>Ornella & Charles</h1>
            <div class="countdown">
                <div class="count-box"><span class="count-num" id="d">00</span><span class="count-label">Jours</span></div>
                <div class="count-box"><span class="count-num" id="h">00</span><span class="count-label">Hrs</span></div>
                <div class="count-box"><span class="count-num" id="m">00</span><span class="count-label">Min</span></div>
                <div class="count-box"><span class="count-num" id="s">00</span><span class="count-label">Sec</span></div>
            </div>
            <a href="invitation.html" class="btn" id="open-btn">Voir l'invitation</a>
        </div>
    </div>
    <script>
        const targetDate = new Date(2026, 6, 29, 17, 30, 0).getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = targetDate - now;
            if (diff > 0) {
                document.getElementById("d").innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
                document.getElementById("h").innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                document.getElementById("m").innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                document.getElementById("s").innerText = Math.floor((diff % (1000 * 60)) / 1000);
            }
        }, 1000);
        document.getElementById('open-btn').addEventListener('click', function(e) {
            e.preventDefault();
            document.getElementById('global-page-content').classList.add('page-turn-active');
            setTimeout(() => { window.location.href = "premiere-page.html"; }, 1000);
        });
    </script>
</body>
</html>
