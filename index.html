<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ornella & Charles | 27 · 08 · 2026</title>

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --coral:      #E8634A;
      --terracotta: #C84B2F;
      --peach:      #F5A678;
      --sand:       #F7E8D0;
      --gold:       #E8A020;
      --turquoise:  #2BBFB0;
      --white:      #FFFDF8;
      --text-dark:  #2A1505;
      --text-mid:   #7A3515;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Montserrat', sans-serif; }

    /* FOND COUCHER DE SOLEIL IBIZA */
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background: linear-gradient(180deg,
        #FFB347 0%, #FF8C42 20%, #E8634A 42%,
        #C84B7A 65%, #7B2D8B 100%);
    }

    /* Mer turquoise en bas */
    .bg-sea {
      position: fixed; bottom: 0; left: 0; right: 0; height: 26%;
      z-index: 1;
      background: linear-gradient(to bottom, #2BBFB0 0%, #0E7A72 100%);
      clip-path: ellipse(62% 42% at 50% 100%);
    }

    /* Halo soleil */
    .sun-halo {
      position: fixed; top: -90px; left: 50%; transform: translateX(-50%);
      width: 340px; height: 340px; border-radius: 50%;
      background: radial-gradient(circle,
        rgba(255,230,100,0.6) 0%, rgba(255,160,50,0.28) 42%, transparent 70%);
      z-index: 1;
      animation: sun-pulse 4s ease-in-out infinite;
    }
    @keyframes sun-pulse {
      0%,100% { transform: translateX(-50%) scale(1); opacity: 0.75; }
      50%      { transform: translateX(-50%) scale(1.1); opacity: 1; }
    }

    /* Reflets mer */
    .sea-sparkle {
      position: fixed; bottom: 0; left: 0; right: 0; height: 26%;
      z-index: 2; pointer-events: none;
      background: repeating-linear-gradient(
        88deg, transparent, transparent 38px,
        rgba(255,255,255,0.07) 39px, rgba(255,255,255,0.07) 40px);
      clip-path: ellipse(62% 42% at 50% 100%);
      animation: shimmer 2.8s ease-in-out infinite;
    }
    @keyframes shimmer { 0%,100% { opacity: 0.35; } 50% { opacity: 1; } }

    /* ELEMENTS TOMBANTS */
    #drops { position: fixed; inset: 0; z-index: 3; pointer-events: none; }
    .drop {
      position: absolute; top: -50px;
      animation: drop-fall linear forwards;
    }
    @keyframes drop-fall {
      0%   { transform: translateY(0)    rotate(0deg)   translateX(0);   opacity: 1; }
      30%  { transform: translateY(30vh) rotate(100deg) translateX(11px); opacity: 0.9; }
      60%  { transform: translateY(60vh) rotate(220deg) translateX(-9px); opacity: 0.7; }
      100% { transform: translateY(112vh) rotate(360deg) translateX(5px); opacity: 0; }
    }

    /* PARTICULES SOLEIL */
    .sparkle {
      position: absolute; border-radius: 50%;
      animation: sp-float ease-in-out infinite;
    }
    @keyframes sp-float {
      0%,100% { transform: translateY(0) scale(1); opacity: 0.2; }
      50%      { transform: translateY(-15px) scale(1.8); opacity: 0.85; }
    }

    /* SCENE */
    .scene {
      position: relative; z-index: 10;
      width: 100%; height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }

    /* ARCHE */
    .arche {
      position: relative;
      width: 88%; max-width: 415px;
      height: 84vh; max-height: 695px;
      border-radius: 210px 210px 0 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 55px 28px 36px;
      background: linear-gradient(170deg,
        rgba(255,253,248,0.97) 0%, rgba(255,245,225,0.96) 40%,
        rgba(252,234,200,0.97) 75%, rgba(248,225,185,0.97) 100%);
      border: 1.5px solid rgba(232,160,32,0.5);
      box-shadow:
        0 35px 100px rgba(44,10,5,0.45),
        0 0 0 1px rgba(255,180,50,0.12),
        0 0 100px rgba(232,99,74,0.22),
        inset 0 0 70px rgba(255,255,255,0.4);
      animation: arche-in 1.2s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes arche-in {
      from { opacity: 0; transform: translateY(28px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Bordure intérieure */
    .arche::before {
      content: '';
      position: absolute;
      top: 13px; bottom: 13px; left: 13px; right: 13px;
      border-radius: 198px 198px 0 0;
      border: 0.8px solid rgba(232,160,32,0.35);
      pointer-events: none;
    }

    /* Halo chaud */
    .arche::after {
      content: '';
      position: absolute; top: -3px; left: -3px; right: -3px;
      height: 52%; border-radius: 213px 213px 0 0;
      background: linear-gradient(to bottom, rgba(255,190,60,0.16), transparent);
      animation: warm-pulse 3.5s ease-in-out infinite; pointer-events: none;
    }
    @keyframes warm-pulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }

    /* Couronne */
    .crown {
      position: absolute; top: -6px; left: 50%;
      transform: translateX(-50%);
      display: flex; align-items: center; gap: 4px;
      filter: drop-shadow(0 2px 12px rgba(255,130,50,0.75));
      animation: crown-in 1.5s 0.4s both;
      font-size: 1.25rem;
    }
    .crown .sm { font-size: 0.82rem; }
    @keyframes crown-in {
      from { opacity: 0; transform: translateX(-50%) scale(0.4); }
      to   { opacity: 1; transform: translateX(-50%) scale(1); }
    }

    /* Ornements latéraux */
    .side { position: absolute; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; align-items: center; gap: 5px; }
    .side.l { left: 14px; }
    .side.r { right: 14px; }
    .sdot { width: 3px; height: 3px; background: var(--gold); border-radius: 50%; opacity: 0.45; }
    .sline { width: 1px; height: 28px; background: linear-gradient(to bottom, transparent, var(--gold), transparent); opacity: 0.35; }

    /* TEXTES */
    .tag {
      font-family: 'Cinzel', serif;
      font-size: 0.54rem; letter-spacing: 6px;
      color: var(--text-mid); text-transform: uppercase;
      font-weight: 700; margin-bottom: 13px; opacity: 0.85;
      animation: fup 1s 0.6s both;
    }

    h1 {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(3rem, 12vw, 4.7rem);
      color: var(--text-dark); text-align: center;
      line-height: 1.05;
      text-shadow: 0 2px 14px rgba(200,75,47,0.15);
      animation: fup 1s 0.7s both;
    }
    .h1b { animation-delay: 0.82s !important; }

    .et {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-size: 1.85rem;
      color: var(--coral); display: block;
      line-height: 1; margin: -3px 0;
      animation: fup 1s 0.76s both;
    }

    .sep {
      display: flex; align-items: center; gap: 8px;
      width: 80%; margin: 15px 0 11px;
      animation: fup 1s 0.9s both;
    }
    .sl { flex: 1; height: 0.5px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
    .sd { width: 5px; height: 5px; background: var(--gold); transform: rotate(45deg); }
    .sm2 { width: 3px; height: 3px; background: var(--peach); transform: rotate(45deg); }

    .save-lbl {
      font-family: 'Cinzel', serif;
      font-size: 0.57rem; letter-spacing: 5px;
      color: var(--text-mid); text-transform: uppercase;
      font-weight: 700; margin-bottom: 4px;
      animation: fup 1s 1s both;
    }

    .date {
      font-family: 'Cinzel', serif;
      font-size: 1.28rem; letter-spacing: 7px;
      color: var(--text-dark); font-weight: 700;
      margin-bottom: 5px;
      animation: fup 1s 1.05s both;
    }

    .lieu {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-size: 0.82rem;
      color: var(--coral); letter-spacing: 1.5px;
      margin-bottom: 22px;
      animation: fup 1s 1.1s both;
    }

    .btn {
      background: linear-gradient(135deg, var(--terracotta) 0%, var(--coral) 55%, var(--peach) 100%);
      color: var(--white); text-decoration: none; display: inline-block;
      padding: 13px 36px; border-radius: 50px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 600; font-size: 0.65rem;
      letter-spacing: 3.5px; text-transform: uppercase;
      margin-bottom: 22px;
      border: 1px solid rgba(255,255,255,0.3);
      box-shadow: 0 8px 24px rgba(200,75,47,0.45), 0 0 0 1px rgba(255,180,100,0.2);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      animation: fup 1s 1.2s both;
      cursor: pointer;
    }
    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(200,75,47,0.55), 0 0 30px rgba(255,160,80,0.28);
    }
    .btn:active { transform: translateY(-1px); }

    .countdown {
      display: flex; gap: 10px;
      border-top: 0.5px solid rgba(232,160,32,0.35);
      padding-top: 17px;
      animation: fup 1s 1.3s both;
    }
    .cbox { display: flex; flex-direction: column; align-items: center; min-width: 47px; }
    .cval {
      font-family: 'Cinzel', serif;
      font-size: 1.42rem; font-weight: 400;
      color: var(--text-dark);
      border-bottom: 1.5px solid var(--coral);
      width: 100%; text-align: center; padding-bottom: 3px;
    }
    .clbl {
      font-size: 0.47rem; text-transform: uppercase;
      letter-spacing: 1.5px; color: var(--text-mid);
      font-weight: 600; margin-top: 5px; opacity: 0.8;
    }

    @keyframes fup {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-height: 640px) {
      .arche { height: 92vh; padding: 44px 24px 26px; }
      h1 { font-size: 2.7rem; }
      .lieu { display: none; }
    }
    @media (max-width: 360px) { .arche { width: 92%; } }
  </style>
</head>
<body>

<div class="bg"></div>
<div class="bg-sea"></div>
<div class="sea-sparkle"></div>
<div class="sun-halo"></div>
<div id="drops"></div>

<div class="scene">
  <div class="arche">

    <div class="crown">
      <span class="sm">🌼</span>
      <span>🌸</span>
      <span class="sm">✦</span>
      <span>🌺</span>
      <span class="sm">🌼</span>
    </div>

    <div class="side l"><div class="sdot"></div><div class="sline"></div><div class="sdot"></div></div>
    <div class="side r"><div class="sdot"></div><div class="sline"></div><div class="sdot"></div></div>

    <div class="tag">Mariage</div>

    <h1>Ornella</h1>
    <span class="et">&amp;</span>
    <h1 class="h1b">Charles</h1>

    <div class="sep">
      <div class="sl"></div>
      <div class="sm2"></div>
      <div class="sd"></div>
      <div class="sm2"></div>
      <div class="sl"></div>
    </div>

    <div class="save-lbl">Save the Date</div>
    <div class="date">27 · 08 · 2026</div>
    <div class="lieu">Pour notre grand jour 🍋</div>

    <a href="invitation.html" class="btn">Voir l'invitation</a>

    <div class="countdown">
      <div class="cbox"><span class="cval" id="days">00</span><span class="clbl">Jours</span></div>
      <div class="cbox"><span class="cval" id="hours">00</span><span class="clbl">Heures</span></div>
      <div class="cbox"><span class="cval" id="mins">00</span><span class="clbl">Min</span></div>
      <div class="cbox"><span class="cval" id="secs">00</span><span class="clbl">Sec</span></div>
    </div>

  </div>
</div>

<script>
  // Éléments tombants : majorité fleurs, quelques citrons
  const dropsEl = document.getElementById('drops');
  const items = ['🌸','🌺','🌸','🌼','🌷','🍋','🌸','🌺','🌼','🌸','🌺','🌷'];

  function spawnDrop() {
    const d = document.createElement('div');
    d.className = 'drop';
    d.textContent = items[Math.floor(Math.random() * items.length)];
    d.style.left = (Math.random() * 100) + 'vw';
    const dur = (Math.random() * 5 + 7).toFixed(1);
    d.style.animationDuration = dur + 's';
    d.style.fontSize = (Math.random() * 0.85 + 0.55).toFixed(2) + 'rem';
    d.style.opacity = (Math.random() * 0.45 + 0.3).toFixed(2);
    dropsEl.appendChild(d);
    setTimeout(() => d.remove(), parseFloat(dur) * 1000);
  }
  setInterval(spawnDrop, 950);
  spawnDrop(); spawnDrop(); spawnDrop();

  // Particules lumineuses
  const bg = document.querySelector('.bg');
  const pColors = ['#FFB830','#FF8C42','#2BBFB0','#FF6B6B','#FFD700','#F5A678'];
  for (let i = 0; i < 30; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    const sz = Math.random() * 4 + 1.5;
    s.style.cssText = `
      width:${sz}px; height:${sz}px;
      left:${Math.random()*100}%; top:${Math.random()*100}%;
      background:${pColors[Math.floor(Math.random()*pColors.length)]};
      filter:blur(${Math.random()>0.5?'0.8px':'0'});
      animation-duration:${(Math.random()*3.5+2.5).toFixed(1)}s;
      animation-delay:${(Math.random()*6).toFixed(1)}s;
    `;
    bg.appendChild(s);
  }

  // Countdown
  const target = new Date('August 27, 2026 00:00:00').getTime();
  function tick() {
    const diff = target - Date.now();
    if (diff <= 0) return;
    document.getElementById('days').textContent  = String(Math.floor(diff / 86400000)).padStart(2,'0');
    document.getElementById('hours').textContent = String(Math.floor((diff % 86400000) / 3600000)).padStart(2,'0');
    document.getElementById('mins').textContent  = String(Math.floor((diff % 3600000) / 60000)).padStart(2,'0');
    document.getElementById('secs').textContent  = String(Math.floor((diff % 60000) / 1000)).padStart(2,'0');
  }
  setInterval(tick, 1000);
  tick();
</script>
</body>
</html>
