<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ornella & Charles</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Cormorant+Garamond:wght@400;700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --ibiza-sun: #F2C94C; 
            --ocean-blue: #2D9CDB;
            --white: #FFFFFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%; width: 100%;
            font-family: 'Cormorant Garamond', serif;
            background-color: var(--white);
            overflow: hidden;
        }

        /* LE FOND : Tes fleurs servent de cadre tout autour */
        .main-bg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('fleur.png');
            background-position: center;
            background-size: cover; /* Remplit l'écran pour faire le cadre */
            z-index: 1;
        }

        /* CONTENEUR CENTRAL : Détaché du fond pour être lisible */
        .content-wrapper {
            position: relative;
            height: 100%; width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            background: rgba(255,255,255,0.2); /* Très léger voile pour la lisibilité */
        }

        /* Photo en Arche */
        .photo-container {
            width: 150px; height: 210px;
            border: 2px solid var(--ibiza-sun);
            padding: 5px; background: #fff;
            border-radius: 75px 75px 0 0;
            margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .photo-container img {
            width: 100%; height: 100%;
            object-fit: cover;
            border-radius: 70px 70px 0 0;
        }

        h1 {
            font-family: 'Pinyon Script', cursive;
            font-size: 3rem;
            color: var(--ibiza-sun);
            margin-bottom: 15px;
            text-shadow: 0 2px 4px rgba(255,255,255,0.8);
        }

        /* Compteur */
        .countdown {
            display: flex; gap: 20px;
            margin-bottom: 35px;
        }

        .count-box { display: flex; flex-direction: column; align-items: center; }
        .count-num { font-size: 1.4rem; font-weight: 700; color: var(--ocean-blue); }
        .count-label { font-size: 0.6rem; text-transform: uppercase; color: var(--ocean-blue); letter-spacing: 1px; }

        /* Bouton */
        .btn {
            background-color: var(--ocean-blue);
            color: #fff;
            text-decoration: none;
            padding: 15px 40px;
            font-size: 0.8rem;
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 50px;
            font-weight: 700;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(45, 156, 219, 0.3);
        }

        @media (max-width: 400px) {
            h1 { font-size: 2.6rem; }
            .photo-container { width: 130px; height: 180px; }
            .main-bg { background-size: contain; background-repeat: no-repeat; } /* Évite le zoom trop fort sur petit tel */
        }
    </style>
</head>
<body>

    <div class="main-bg"></div>

    <div class="content-wrapper">
        <div class="photo-container">
            <img src="photo.jpeg" alt="Ornella & Charles">
        </div>
        
        <h1>Ornella & Charles</h1>
        
        <div class="countdown" id="countdown">
            <div class="count-box"><span class="count-num" id="d">00</span><span class="count-label">Jours</span></div>
            <div class="count-box"><span class="count-num" id="h">00</span><span class="count-label">Heures</span></div>
            <div class="count-box"><span class="count-num" id="m">00</span><span class="count-label">Min</span></div>
            <div class="count-box"><span class="count-num" id="s">00</span><span class="count-label">Sec</span></div>
        </div>

        <a href="premiere-page.html" class="btn">Voir l'invitation</a>
    </div>

    <script>
        const targetDate = new Date(2026, 6, 29, 17, 30, 0).getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = targetDate - now;
            if (diff > 0) {
                document.getElementById("d").innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
                document.getElementById("h").innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                document.getElementById("m").innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                document.getElementById("s").innerText = Math.floor((diff % (1000 * 60)) / 1000);
            }
        }, 1000);
    </script>
</body>
</html>
