<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mariage de Ornella & Charles</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Cinzel:wght@400;500&family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #C5A059; 
            --gold-light: #E8D5B5;
            --white: #FFFFFF;
            --dark-gold: #A68549; /* Pour un texte plus lisible */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            width: 100%;
            background-color: var(--white);
            font-family: 'Cormorant Garamond', serif;
            overflow: hidden;
        }

        .floral-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('fleur.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transform: scaleX(-1); 
            z-index: 1;
            opacity: 0.8;
        }

        .main-wrapper {
            position: relative;
            z-index: 10;
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .photo-arche {
            width: 180px; 
            height: 240px; 
            background: #fff;
            padding: 5px;
            border: 1px solid var(--gold-light);
            border-radius: 90px 90px 0 0; 
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            overflow: hidden; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .photo-arche img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 85px 85px 0 0; 
            transform: scale(1.3); 
        }

        /* --- CORRECTION TITRE --- */
        h1 {
            font-family: 'Pinyon Script', cursive;
            font-size: 1.9rem; /* Plus petit */
            color: var(--dark-gold); /* Un peu plus foncé pour être prononcé */
            margin-bottom: 20px;
            line-height: 1.2;
            font-weight: 600; /* Plus prononcé */
            /* Un léger contour pour renforcer la visibilité sans épaissir grossièrement */
            text-shadow: 0.3px 0.3px 0px rgba(166, 133, 73, 0.5);
        }

        .timer-container {
            display: flex;
            gap: 15px;
            margin-bottom: 35px;
            background: rgba(255, 255, 255, 0.6);
            padding: 10px 20px;
            border-radius: 50px;
            backdrop-filter: blur(2px);
        }

        .timer-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 40px;
        }

        .timer-val {
            font-size: 1.1rem;
            color: var(--gold);
            font-weight: 600;
        }

        .timer-label {
            font-size: 0.5rem;
            text-transform: uppercase;
            color: #777;
            letter-spacing: 1.5px;
            margin-top: 2px;
        }

        .btn-open {
            background-color: #B08D57;
            color: #fff;
            text-decoration: none;
            font-family: 'Cinzel', serif;
            font-size: 0.75rem;
            padding: 14px 35px;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(176, 141, 87, 0.3);
            border-radius: 2px;
        }

        .btn-open:hover {
            background-color: var(--gold);
            transform: translateY(-2px);
        }

        /* --- ADAPTATION MOBILE --- */
        @media (max-width: 480px) {
            h1 { font-size: 1.7rem; }
            .photo-arche { width: 160px; height: 210px; border-radius: 80px 80px 0 0; }
            .timer-container { gap: 10px; padding: 8px 15px; }
            .timer-val { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="floral-background"></div>

    <div class="main-wrapper">
        <div class="photo-arche">
            <img src="photo.jpeg" alt="Ornella & Charles">
        </div>

        <h1>Ornella & Charles</h1>

        <div class="timer-container">
            <div class="timer-box">
                <span class="timer-val" id="d">00</span>
                <span class="timer-label">Jours</span>
            </div>
            <div class="timer-box">
                <span class="timer-val" id="h">00</span>
                <span class="timer-label">Hrs</span>
            </div>
            <div class="timer-box">
                <span class="timer-val" id="m">00</span>
                <span class="timer-label">Min</span>
            </div>
            <div class="timer-box">
                <span class="timer-val" id="s">00</span>
                <span class="timer-label">Sec</span>
            </div>
        </div>

        <a href="invitation.html" class="btn-open">Voir l'invitation</a>
    </div>

    <script>
        // Cible : 29 Juillet 2026 à 17h30
        const target = new Date(2026, 6, 29, 17, 30, 0).getTime();

        function updateTimer() {
            const now = new Date().getTime();
            const diff = target - now;

            if (diff > 0) {
                document.getElementById('d').innerText = String(Math.floor(diff / (1000 * 60 * 60 * 24))).padStart(2, '0');
                document.getElementById('h').innerText = String(Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60))).padStart(2, '0');
                document.getElementById('m').innerText = String(Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60))).padStart(2, '0');
                document.getElementById('s').innerText = String(Math.floor((diff % (1000 * 60)) / 1000)).padStart(2, '0');
            } else {
                document.querySelector('.timer-container').style.display = 'none';
            }
        }
        
        updateTimer();
        setInterval(updateTimer, 1000);
    </script>
</body>
</html>
